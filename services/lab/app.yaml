command:
  - "python"
  - "-m"
  - "uvicorn"
  - "lab.app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: SERVICE_NAME
    value: "lab"

  # See services/patient/app.yaml for the PYTHONPATH=src rationale.
  - name: PYTHONPATH
    value: "src"

  # PG* env vars are auto-injected by the Apps platform once the `lab_db`
  # postgres resource is declared (see resources/lab.yml).
  - name: ENDPOINT_NAME
    valueFrom: "lab_db"
