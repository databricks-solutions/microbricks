resources:
  apps:
    clinic_sim_app:
      # `${var.app_name_suffix}` is empty for canonical dev/test/prod deploys
      # (so the name is `clinic-sim` in every workspace) and `-feat-<slug>`
      # for per-PR preview deploys (`clinic-sim-feat-<slug>`). See
      # databricks.yml for the rationale.
      name: clinic-sim${var.app_name_suffix}
      description: "Animated patient-journey simulator. Drives every service end-to-end through real CRUD calls."
      source_code_path: ../frontend/clinic-sim
      permissions:
        - level: CAN_USE
          group_name: users

      # Same OBO scopes as hc-portal — the simulator is a fan-out BFF, not a
      # data owner, and it needs `sql` + `postgres` so the user's token can
      # be forwarded to each service intact.
      user_api_scopes:
        - "sql"
        - "postgres"