# See resources/patient.yml: Lakebase projects are managed outside the
# bundle. Use `scripts/lakebase-project-{up,down}.sh` for project lifecycle.
resources:
  apps:
    provider_app:
      name: provider${var.app_name_suffix}
      description: "System of record for clinicians, organizations, and specialties."
      source_code_path: ../services/provider

      # See resources/patient.yml for why backend services need `postgres`.
      user_api_scopes:
        - "postgres"

      resources:
        - name: provider_db
          description: "Provider service Lakebase Autoscale project."
          postgres:
            # See databricks.yml for `lakebase_branch` semantics.
            branch: projects/provider/branches/${var.lakebase_branch}
            database: projects/provider/branches/${var.lakebase_branch}/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE
