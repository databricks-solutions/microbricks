# See resources/patient.yml: Lakebase projects are managed outside the
# bundle. Use `scripts/lakebase-project-{up,down}.sh` for project lifecycle.
resources:
  apps:
    appointment_app:
      name: appointment${var.app_name_suffix}
      description: "System of record for scheduled and historical visits, open slots, and visit types."
      source_code_path: ../services/appointment
      permissions:
        - level: CAN_USE
          group_name: users

      # See resources/patient.yml for why backend services need `postgres`.
      user_api_scopes:
        - "postgres"

      resources:
        - name: appointment_db
          description: "Appointment service Lakebase Autoscale project."
          postgres:
            # See databricks.yml for `lakebase_branch` semantics.
            branch: projects/appointment/branches/${var.lakebase_branch}
            database: projects/appointment/branches/${var.lakebase_branch}/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE
