# See resources/patient.yml: Lakebase projects are managed outside the
# bundle. Use `scripts/lakebase-project-{up,down}.sh` for project lifecycle.
resources:
  apps:
    prescription_app:
      name: prescription-${bundle.target}${var.app_name_suffix}
      description: "System of record for active and historical prescriptions and the refill workflow."
      source_code_path: ../services/prescription

      # See resources/patient.yml for why backend services need `postgres`.
      user_api_scopes:
        - "postgres"

      resources:
        - name: prescription_db
          description: "Prescription service Lakebase Autoscale project."
          postgres:
            # See databricks.yml for `lakebase_branch` semantics.
            branch: projects/prescription-${bundle.target}/branches/${var.lakebase_branch}
            database: projects/prescription-${bundle.target}/branches/${var.lakebase_branch}/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE
