# See resources/patient.yml: Lakebase projects are managed outside the
# bundle. Use `scripts/lakebase-project-{up,down}.sh` for project lifecycle.
resources:
  apps:
    lab_app:
      name: lab-${bundle.target}${var.app_name_suffix}
      description: "System of record for lab orders, results, and reference ranges."
      source_code_path: ../services/lab

      # See resources/patient.yml for why backend services need `postgres`.
      user_api_scopes:
        - "postgres"

      resources:
        - name: lab_db
          description: "Lab service Lakebase Autoscale project."
          postgres:
            # See databricks.yml for `lakebase_branch` semantics.
            branch: projects/lab-${bundle.target}/branches/${var.lakebase_branch}
            database: projects/lab-${bundle.target}/branches/${var.lakebase_branch}/databases/databricks-postgres
            permission: CAN_CONNECT
