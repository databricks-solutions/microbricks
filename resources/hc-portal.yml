resources:
  apps:
    hc_portal_app:
      name: hc-portal${var.app_name_suffix}
      description: "Healthcare clinician portal — frontend + BFF."
      source_code_path: ../frontend/hc-portal

      # No `config.env` block by default: the BFF composes every downstream
      # URL at runtime from its own platform-injected `DATABRICKS_APP_URL`.
      # Sibling services follow the `<svc>-<target>-<wsid>...` pattern, so
      # peeling off our own `hc-portal` prefix yields the shared tail. See
      # `frontend/hc-portal/src/hc_portal/clients/_base.py`. This sidesteps
      # two DAB asymmetries:
      #   - `${resources.apps.<key>.url}` does NOT resolve at bundle-deploy
      #     time (`bundle validate -o json` shows `url=null`).
      #   - `bundle deploy` syncs source files but does NOT push
      #     `config.env` to the running App spec; you'd need a separate
      #     `apps update` call to plumb env vars through.
      # `${resources.apps.<key>.name}` DOES resolve, and we still need it
      # below for the `CAN_USE` ACLs.
      #
      # To override one or more service URLs (PR preview, alternate
      # region, fan-out across workspaces), add a `config.env` block here
      # with the literal URL. The BFF reads `<SVC>_SVC_URL` and prefers
      # it over the runtime-derived default. Example:
      #
      #   config:
      #     env:
      #       - name: PATIENT_SVC_URL
      #         value: "https://patient-pr-1234-7474643727449861.aws.databricksapps.com"
      #
      # The same override can also live in `frontend/hc-portal/app.yml`
      # (commented-out example there). Bundle `config.env` overrides
      # `app.yml` env on a per-key basis.

      # The BFF doesn't talk to a DB itself — only the six backend services
      # do. It does need user-OBO so it can forward `X-Forwarded-Access-Token`
      # to each downstream service unmodified (see hc-bff-pattern). Same scopes
      # as the services so OBO traversal stays trust-preserving.
      # OBO scopes ONLY the portal needs (the six backend services declare no
      # scopes — they're token-receivers, not token-requesters):
      #   - `sql`      → query Lakehouse warehouses (saved configs, joins
      #                  across UC, dashboards-style reads).
      #   - `postgres` → mint Lakebase OAuth credentials directly from the
      #                  portal if a route ever needs to connect to a service's
      #                  database without going through the service.
      # `iam.*` scopes are platform defaults and are NOT user-grantable.
      user_api_scopes:
        - "sql"
        - "postgres"