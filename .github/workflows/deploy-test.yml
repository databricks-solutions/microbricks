name: deploy-test

# Deploys to the `test` workspace. Triggered by:
#   - push to release/* (cutting a release branch automatically lands here)
#   - push to main (the release-PR merge produces a push event on main)
#
# `test` is a production-mode bundle (no per-user root_path) on the hc-test
# profile. Lakebase branches are always `production` here — feature isolation
# only happens in dev.
#
# Same migration-then-deploy ordering as deploy-dev. The smoke tests at the
# end gate the run; a failure here blocks the release from being tagged for
# prod.

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: false

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_TEST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [patient, provider, appointment, lab, prescription, billing]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: uv sync
        working-directory: services/${{ matrix.service }}
        run: uv sync --all-groups
      - name: Tests
        working-directory: services/${{ matrix.service }}
        # Run integration tests too where they don't require a live DB; the
        # ones marked `integration` are skipped by default in CI because we
        # don't bind a feature endpoint here.
        run: uv run pytest -m 'not integration' -q

  test-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: uv sync (BFF)
        working-directory: frontend/hc-portal
        run: uv sync --all-groups
      - name: BFF tests
        working-directory: frontend/hc-portal
        run: uv run pytest -m 'not integration' -q

  deploy:
    needs: [test, test-portal]
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://hc-portal.databricksapps.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - uses: databricks/setup-cli@main
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-test profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_TEST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        # See pr-validate.yml for the rationale.
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-test]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me -p hc-test

      - name: Ensure Lakebase projects exist (idempotent)
        # See deploy-dev.yml for rationale.
        run: |
          for svc in patient provider appointment lab prescription billing; do
            ./scripts/lakebase-project-up.sh "$svc" test hc-test
          done

      - name: Run migrations (production branches, all six services)
        # No LOCAL_DEV_TOKEN export here: `databricks auth token` only works
        # for U2M, and we authenticate as an SP via M2M in CI. The alembic
        # env.py falls back to the SDK's default credential chain, which picks
        # up DATABRICKS_HOST + DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET
        # off the workflow env automatically.
        run: |
          set -euo pipefail
          export PGUSER=$(databricks current-user me -p hc-test -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["userName"])')
          for svc in patient provider appointment lab prescription billing; do
            echo "→ Migrating $svc against test/production"
            cd "services/$svc"
            ENDPOINT="projects/$svc/branches/production/endpoints/primary"
            HOST=$(databricks postgres get-endpoint "$ENDPOINT" -p hc-test -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"]["hosts"]["host"])')
            export PGHOST="$HOST"
            export PGPORT=5432
            export PGDATABASE=databricks_postgres
            export PGSSLMODE=require
            export ENDPOINT_NAME="$ENDPOINT"
            uv sync --all-groups
            uv run alembic upgrade head
            cd "$GITHUB_WORKSPACE"
          done

      - name: bundle deploy
        run: databricks bundle deploy -t test

      - name: bundle run (submit a new app deployment for each app, in parallel)
        # See deploy-dev.yml for the rationale + parallelization shape.
        run: |
          set -euo pipefail
          LOG_DIR=$(mktemp -d)
          KEYS=(patient_app provider_app appointment_app lab_app prescription_app billing_app hc_portal_app)
          PIDS=()
          for KEY in "${KEYS[@]}"; do
            ( databricks bundle run -t test "$KEY" ) > "$LOG_DIR/$KEY.log" 2>&1 &
            PID=$!
            PIDS+=("$PID")
            echo "→ kicked $KEY (pid=$PID)"
          done
          FAIL=0
          for i in "${!KEYS[@]}"; do
            KEY="${KEYS[$i]}"
            if wait "${PIDS[$i]}"; then
              echo "✓ $KEY"
              tail -3 "$LOG_DIR/$KEY.log" | sed 's/^/    /'
            else
              echo "::error::$KEY failed; full log:"
              cat "$LOG_DIR/$KEY.log"
              FAIL=1
            fi
          done
          rm -rf "$LOG_DIR"
          (( FAIL == 0 )) || exit 1

      - name: Wait for RUNNING state
        run: |
          set -euo pipefail
          for app in patient provider appointment lab prescription billing hc-portal; do
            for i in $(seq 1 20); do
              STATE=$(databricks apps get "$app" -p hc-test -o json \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("app_status",{}).get("state",""))')
              echo "  $app attempt $i/20: state=$STATE"
              if [[ "$STATE" == "RUNNING" ]]; then
                break
              fi
              if (( i == 20 )); then
                echo "::error::$app did not reach RUNNING within 5 minutes"
                exit 1
              fi
              sleep 15
            done
          done

      - name: Smoke test (honest /healthz check)
        # See deploy-dev.yml for the full rationale. Same SP-token + strict
        # status + body assertion shape.
        run: |
          set -euo pipefail
          TOKEN=$(databricks auth token -p hc-test -o json \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          assert_healthz() {
            local app="$1" path="$2"
            local url body_file http_code body
            url=$(databricks apps get "$app" -p hc-test -o json \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')
            if [[ -z "$url" ]]; then
              echo "::error::$app has no URL"
              return 1
            fi
            body_file=$(mktemp)
            http_code=$(curl -sS -o "$body_file" -w '%{http_code}' --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$url$path")
            body=$(cat "$body_file"); rm -f "$body_file"
            if [[ "$http_code" != "200" ]]; then
              echo "::error::$app $path -> HTTP $http_code (expected 200)"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            if [[ "$body" != '{"ok":true}' ]]; then
              echo "::error::$app $path -> 200 but body mismatch:"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            echo "✓ $app $path -> 200 $body"
          }
          FAIL=0
          for app in patient provider appointment lab prescription billing; do
            assert_healthz "$app" "/api/v1/healthz" || FAIL=1
          done
          assert_healthz hc-portal "/api/bff/healthz" || FAIL=1
          (( FAIL == 0 )) || exit 1
