name: nightly-orphan-cleanup

# Garbage collect Lakebase feature branches whose PR is no longer open. Runs
# daily; the platform's 24h Lakebase TTL is the safety net for branches that
# slip through (e.g. when a PR is force-deleted before pr-cleanup gets to it),
# but reaping them sooner keeps the dev workspace tidy and lowers idle compute.
#
# Algorithm:
#   1. List every Lakebase branch under each `<svc>` project (in the dev
#      workspace) that starts with `pr-`.
#   2. List every open PR + every recently-closed-but-unprocessed PR.
#      Compute the expected slug for each.
#   3. Anything in (1) whose slug is NOT in (2) is orphaned -> delete via
#      lakebase-branch-down.sh. Each call is idempotent + tolerant.
#
# Bundle-deployed preview apps are NOT deleted by this job — the apps follow
# the Lakebase branch into oblivion via the Apps platform's resource-cleanup
# behavior. If an orphan app remains, it'll surface in the dev workspace's
# `apps list` and we'll handle it manually rather than build a second
# reconciler here.
#
# `workflow_dispatch` is included so a human can run this on demand
# ("clean up that branch I closed two minutes ago, don't make me wait").

on:
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC; off-peak; minute chosen to avoid round-hour API surge
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orphan-cleanup
  cancel-in-progress: false

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_DEV }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  reap:
    runs-on: ubuntu-latest
    # Bind to `dev` so this job sees the env-scoped Databricks secrets.
    environment:
      name: dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Discover services
        id: disc
        run: |
          OUT=$(./scripts/discover-projects.sh)
          echo "service_dirs=$(echo "$OUT" | jq -c '.service_dirs')" >> "$GITHUB_OUTPUT"

      - uses: databricks/setup-cli@cb0efd3c46ddbb344dde5b171afdb7fefc3337ba # v1.4.0
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-dev profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_DEV }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        # See pr-validate.yml for the rationale.
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-dev]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me -p hc-dev

      - name: Compute open-PR slug allowlist
        id: open
        env:
          GH_TOKEN: ${{ github.token }}
        # `gh pr list --state open` covers what's actively in flight. We
        # also include `--state merged` for the past 24h to cover the gap
        # between merge -> pr-cleanup -> our run; same for `--state closed`.
        run: |
          set -euo pipefail
          ALLOW=()
          for state in open merged closed; do
            while IFS=$'\t' read -r num ref; do
              [[ -z "$num" ]] && continue
              ALLOW+=("pr-$num")
            done < <(gh pr list \
              --state "$state" \
              --search "updated:>=$(date -u -d '24 hours ago' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)" \
              --json number,headRefName --jq '.[] | "\(.number)\t\(.headRefName)"' 2>/dev/null || true)
          done
          # Dedupe + emit one slug per line into a file the next step can grep.
          printf '%s\n' "${ALLOW[@]}" | sort -u > .allowlist
          echo "Allowlist size: $(wc -l < .allowlist)"

      - name: Reap orphaned Lakebase branches
        env:
          SERVICE_DIRS: ${{ steps.disc.outputs.service_dirs }}
        run: |
          set -euo pipefail
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            echo "→ Scanning projects/$svc"
            BRANCHES=$(databricks postgres list-branches "projects/$svc" -p hc-dev -o json 2>/dev/null \
              | python3 -c 'import json,sys; [print(b["name"]) for b in json.load(sys.stdin)]' \
              | grep -E '^pr-' || true)
            for branch in $BRANCHES; do
              if grep -qx "$branch" .allowlist; then
                echo "  keep $branch (PR still tracked)"
              else
                echo "  REAP $branch"
                ./scripts/lakebase-branch-down.sh "$svc" "$branch" hc-dev
              fi
            done
          done
