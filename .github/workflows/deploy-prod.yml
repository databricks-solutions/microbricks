name: deploy-prod

# Production deploy. Triggered ONLY by pushing a `v*` tag on `main`.
# The `prod` GitHub environment has required reviewers configured (Phase 0
# of ROADMAP.md), which produces the manual-approval gate.
#
# Two-phase pipeline:
#   Phase 1 (e2e-verify): ephemeral Lakebase branches + temporary apps validate
#     that migration scripts and app startup work against the prod workspace.
#   Phase 2 (deploy): permanent deploy — migrations hit the real production
#     Lakebase branch, stable apps are deployed.
#
# Hard rules:
#   - Tag must be on `main`. We refuse to deploy a tag from any other branch
#     because that would let a feature branch sneak straight to prod.
#   - Migrations run before bundle deploy. Same ordering as dev/test.
#   - Schema evolution scripts are applied in BOTH phases.
#   - Rollback is "redeploy the previous tag"; documented in
#     docs/runbooks/prod-rollback.md (deferred — Phase 8).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_PROD }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      service_dirs: ${{ steps.disc.outputs.service_dirs }}
      frontend_dirs: ${{ steps.disc.outputs.frontend_dirs }}
      all_bundle_keys: ${{ steps.disc.outputs.all_bundle_keys }}
      all_app_names: ${{ steps.disc.outputs.all_app_names }}
      services_json: ${{ steps.disc.outputs.services_json }}
      frontends_json: ${{ steps.disc.outputs.frontends_json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - id: disc
        run: |
          OUT=$(./scripts/discover-projects.sh)
          echo "service_dirs=$(echo "$OUT" | jq -c '.service_dirs')" >> "$GITHUB_OUTPUT"
          echo "frontend_dirs=$(echo "$OUT" | jq -c '.frontend_dirs')" >> "$GITHUB_OUTPUT"
          echo "all_bundle_keys=$(echo "$OUT" | jq -c '.all_bundle_keys')" >> "$GITHUB_OUTPUT"
          echo "all_app_names=$(echo "$OUT" | jq -c '.all_app_names')" >> "$GITHUB_OUTPUT"
          echo "services_json=$(echo "$OUT" | jq -c '.services')" >> "$GITHUB_OUTPUT"
          echo "frontends_json=$(echo "$OUT" | jq -c '.frontends')" >> "$GITHUB_OUTPUT"

  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Confirm tag is on main
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not on main."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME is on main — OK to deploy."

  # ---------------------------------------------------------------------------
  # Phase 1: Ephemeral E2E verification.
  # Deploys temporary apps against isolated Lakebase branches in the prod
  # workspace. If migrations or healthz fail here, the permanent deploy is
  # blocked.
  # ---------------------------------------------------------------------------
  e2e-verify:
    needs: [discover, verify-tag-on-main]
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: databricks/setup-cli@cb0efd3c46ddbb344dde5b171afdb7fefc3337ba # v1.4.0
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-prod profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_PROD }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-prod]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me -p hc-prod

      - name: Compute E2E slug
        id: slug
        run: |
          SLUG=$(./scripts/compute-e2e-slug.sh "${{ github.ref_name }}")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "E2E slug: $SLUG"

      - name: Ensure Lakebase projects exist (idempotent)
        env:
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-project-up.sh "$svc" prod hc-prod
          done

      - name: Create ephemeral Lakebase branches
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          set -euo pipefail
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-branch-up.sh "$svc" "$SLUG" hc-prod
          done

      - name: Run migrations against ephemeral branches
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          set -euo pipefail
          export PGUSER=$(databricks current-user me -p hc-prod -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["userName"])')
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            echo "→ Migrating $svc against ephemeral branch $SLUG"
            cd "services/$svc"
            ENDPOINT="projects/$svc/branches/$SLUG/endpoints/primary"
            HOST=$(databricks postgres get-endpoint "$ENDPOINT" -p hc-prod -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"]["hosts"]["host"])')
            export PGHOST="$HOST"
            export PGPORT=5432
            export PGDATABASE=databricks_postgres
            export PGSSLMODE=require
            export ENDPOINT_NAME="$ENDPOINT"
            uv sync --frozen --all-groups
            uv run alembic upgrade head
            cd "$GITHUB_WORKSPACE"
          done

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/*/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install apx CLI
        uses: ./.github/actions/setup-apx
        with:
          version: v0.3.8

      - name: Build all frontend UIs
        run: ./scripts/build-frontends.sh

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-builds
          path: frontend/*/src/*/__dist__/
          retention-days: 1

      - name: Deploy ephemeral apps (e2e-prod target)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          databricks bundle deploy -t e2e-prod \
            --var "app_name_suffix=-$SLUG" \
            --var "lakebase_branch=$SLUG"

      - name: Run ephemeral apps
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          ALL_BUNDLE_KEYS: ${{ needs.discover.outputs.all_bundle_keys }}
        run: |
          set -euo pipefail
          LOG_DIR=$(mktemp -d)
          mapfile -t KEYS < <(echo "$ALL_BUNDLE_KEYS" | jq -r '.[]')
          PIDS=()
          for KEY in "${KEYS[@]}"; do
            ( databricks bundle run -t e2e-prod "$KEY" \
                --var "app_name_suffix=-$SLUG" \
                --var "lakebase_branch=$SLUG"
            ) > "$LOG_DIR/$KEY.log" 2>&1 &
            PID=$!
            PIDS+=("$PID")
            echo "→ kicked $KEY (pid=$PID)"
          done
          FAIL=0
          for i in "${!KEYS[@]}"; do
            KEY="${KEYS[$i]}"
            if wait "${PIDS[$i]}"; then
              echo "✓ $KEY"
              tail -3 "$LOG_DIR/$KEY.log" | sed 's/^/    /'
            else
              echo "::error::$KEY failed; full log:"
              cat "$LOG_DIR/$KEY.log"
              FAIL=1
            fi
          done
          rm -rf "$LOG_DIR"
          (( FAIL == 0 )) || exit 1

      - name: Wait for RUNNING state (ephemeral apps)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          ALL_APP_NAMES: ${{ needs.discover.outputs.all_app_names }}
        run: |
          set -euo pipefail
          for app in $(echo "$ALL_APP_NAMES" | jq -r '.[]'); do
            for i in $(seq 1 20); do
              STATE=$(databricks apps get "$app-$SLUG" -p hc-prod -o json \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("app_status",{}).get("state",""))')
              echo "  $app-$SLUG attempt $i/20: state=$STATE"
              if [[ "$STATE" == "RUNNING" ]]; then
                break
              fi
              if (( i == 20 )); then
                echo "::error::$app-$SLUG did not reach RUNNING within 5 minutes"
                exit 1
              fi
              sleep 15
            done
          done

      - name: Smoke-test ephemeral apps
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          SERVICES_JSON: ${{ needs.discover.outputs.services_json }}
          FRONTENDS_JSON: ${{ needs.discover.outputs.frontends_json }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS --fail \
            -u "$DATABRICKS_CLIENT_ID:$DATABRICKS_CLIENT_SECRET" \
            --data-urlencode 'grant_type=client_credentials' \
            --data-urlencode 'scope=all-apis' \
            "$DATABRICKS_HOST/oidc/v1/token" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          assert_healthz() {
            local app="$1" path="$2"
            local url body_file http_code body
            url=$(databricks apps get "$app" -p hc-prod -o json \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')
            if [[ -z "$url" ]]; then
              echo "::error::$app has no URL"
              return 1
            fi
            body_file=$(mktemp)
            http_code=$(curl -sS -o "$body_file" -w '%{http_code}' --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$url$path")
            body=$(cat "$body_file"); rm -f "$body_file"
            if [[ "$http_code" != "200" ]]; then
              echo "::error::$app $path -> HTTP $http_code (expected 200)"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            if [[ "$body" != '{"ok":true}' ]]; then
              echo "::error::$app $path -> 200 but body mismatch:"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            echo "✓ $app $path -> 200 $body"
          }
          FAIL=0
          for row in $(echo "$SERVICES_JSON" | jq -c '.[]'); do
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app-$SLUG" "$healthz" || FAIL=1
          done
          for row in $(echo "$FRONTENDS_JSON" | jq -c '.[]'); do
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app-$SLUG" "$healthz" || FAIL=1
          done
          (( FAIL == 0 )) || exit 1

      - name: Tear down ephemeral apps
        if: always()
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          set +e
          databricks bundle destroy -t e2e-prod \
            --var "app_name_suffix=-$SLUG" \
            --var "lakebase_branch=$SLUG" \
            --auto-approve
          exit 0

      - name: Tear down ephemeral Lakebase branches
        if: always()
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-branch-down.sh "$svc" "$SLUG" hc-prod
          done

  # ---------------------------------------------------------------------------
  # Phase 2: Permanent deploy.
  # Migrations run against the real production Lakebase branch, stable apps are
  # deployed. Only runs if Phase 1 (e2e-verify) passes.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [discover, e2e-verify]
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ steps.portal-url.outputs.url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: databricks/setup-cli@cb0efd3c46ddbb344dde5b171afdb7fefc3337ba # v1.4.0
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-prod profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_PROD }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-prod]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me -p hc-prod

      - name: Ensure Lakebase projects exist (idempotent)
        env:
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-project-up.sh "$svc" prod hc-prod
          done

      - name: Run migrations (production branches, all services)
        env:
          SERVICE_DIRS: ${{ needs.discover.outputs.service_dirs }}
        run: |
          set -euo pipefail
          export PGUSER=$(databricks current-user me -p hc-prod -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["userName"])')
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            echo "→ Migrating $svc against prod/production"
            cd "services/$svc"
            ENDPOINT="projects/$svc/branches/production/endpoints/primary"
            HOST=$(databricks postgres get-endpoint "$ENDPOINT" -p hc-prod -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"]["hosts"]["host"])')
            export PGHOST="$HOST"
            export PGPORT=5432
            export PGDATABASE=databricks_postgres
            export PGSSLMODE=require
            export ENDPOINT_NAME="$ENDPOINT"
            uv sync --frozen --all-groups
            uv run alembic upgrade head
            cd "$GITHUB_WORKSPACE"
          done

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/*/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Download frontend build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-builds
          path: frontend/

      - name: Install apx CLI
        uses: ./.github/actions/setup-apx
        with:
          version: v0.3.8

      - name: bundle deploy
        run: databricks bundle deploy -t prod

      - name: bundle run (submit a new app deployment for each app, in parallel)
        env:
          ALL_BUNDLE_KEYS: ${{ needs.discover.outputs.all_bundle_keys }}
        run: |
          set -euo pipefail
          LOG_DIR=$(mktemp -d)
          mapfile -t KEYS < <(echo "$ALL_BUNDLE_KEYS" | jq -r '.[]')
          PIDS=()
          for KEY in "${KEYS[@]}"; do
            ( databricks bundle run -t prod "$KEY" ) > "$LOG_DIR/$KEY.log" 2>&1 &
            PID=$!
            PIDS+=("$PID")
            echo "→ kicked $KEY (pid=$PID)"
          done
          FAIL=0
          for i in "${!KEYS[@]}"; do
            KEY="${KEYS[$i]}"
            if wait "${PIDS[$i]}"; then
              echo "✓ $KEY"
              tail -3 "$LOG_DIR/$KEY.log" | sed 's/^/    /'
            else
              echo "::error::$KEY failed; full log:"
              cat "$LOG_DIR/$KEY.log"
              FAIL=1
            fi
          done
          rm -rf "$LOG_DIR"
          (( FAIL == 0 )) || exit 1

      - name: Wait for RUNNING state
        env:
          ALL_APP_NAMES: ${{ needs.discover.outputs.all_app_names }}
        run: |
          set -euo pipefail
          for app in $(echo "$ALL_APP_NAMES" | jq -r '.[]'); do
            for i in $(seq 1 20); do
              STATE=$(databricks apps get "$app" -p hc-prod -o json \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("app_status",{}).get("state",""))')
              echo "  $app attempt $i/20: state=$STATE"
              if [[ "$STATE" == "RUNNING" ]]; then
                break
              fi
              if (( i == 20 )); then
                echo "::error::$app did not reach RUNNING within 5 minutes"
                exit 1
              fi
              sleep 15
            done
          done

      - name: Smoke test (honest /healthz check)
        env:
          SERVICES_JSON: ${{ needs.discover.outputs.services_json }}
          FRONTENDS_JSON: ${{ needs.discover.outputs.frontends_json }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS --fail \
            -u "$DATABRICKS_CLIENT_ID:$DATABRICKS_CLIENT_SECRET" \
            --data-urlencode 'grant_type=client_credentials' \
            --data-urlencode 'scope=all-apis' \
            "$DATABRICKS_HOST/oidc/v1/token" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          assert_healthz() {
            local app="$1" path="$2"
            local url body_file http_code body
            url=$(databricks apps get "$app" -p hc-prod -o json \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')
            if [[ -z "$url" ]]; then
              echo "::error::$app has no URL"
              return 1
            fi
            body_file=$(mktemp)
            http_code=$(curl -sS -o "$body_file" -w '%{http_code}' --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$url$path")
            body=$(cat "$body_file"); rm -f "$body_file"
            if [[ "$http_code" != "200" ]]; then
              echo "::error::$app $path -> HTTP $http_code (expected 200)"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            if [[ "$body" != '{"ok":true}' ]]; then
              echo "::error::$app $path -> 200 but body mismatch:"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            echo "✓ $app $path -> 200 $body"
          }
          FAIL=0
          for row in $(echo "$SERVICES_JSON" | jq -c '.[]'); do
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app" "$healthz" || FAIL=1
          done
          for row in $(echo "$FRONTENDS_JSON" | jq -c '.[]'); do
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app" "$healthz" || FAIL=1
          done
          (( FAIL == 0 )) || exit 1

      - name: Resolve portal URL for environment link
        id: portal-url
        env:
          FRONTENDS_JSON: ${{ needs.discover.outputs.frontends_json }}
        run: |
          set -euo pipefail
          PORTAL=$(echo "$FRONTENDS_JSON" | jq -r '.[0].app_name')
          URL=$(databricks apps get "$PORTAL" -p hc-prod -o json \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved $PORTAL URL: $URL"
