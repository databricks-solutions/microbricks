name: pr-validate

# Triggered on every PR open / synchronize / reopen against develop, release/*,
# or main. The job:
#   1. Discovers services + frontends dynamically from the filesystem.
#   2. Detects which services + frontends + infra changed.
#   3. Runs lint + unit tests for each changed service in parallel.
#   4. Provisions a Lakebase feature-branch per changed *backend* service.
#   5. Runs `alembic upgrade head` against each feature branch.
#   6. Deploys a preview bundle (`databricks bundle deploy -t dev`) with
#      `app_name_suffix=-<slug>` and `lakebase_branch=<slug>`.
#   7. Smoke-tests the preview, then comments the URLs on the PR.

on:
  pull_request:
    branches: [develop, release/*, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_DEV }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: discover projects + detect changes.
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
      changed_services: ${{ steps.changed.outputs.changed_services }}
      changed_frontends: ${{ steps.changed.outputs.changed_frontends }}
      frontends: ${{ steps.filter.outputs.frontends }}
      infra: ${{ steps.filter.outputs.infra }}
      slug: ${{ steps.slug.outputs.slug }}
      service_dirs: ${{ steps.disc.outputs.service_dirs }}
      frontend_dirs: ${{ steps.disc.outputs.frontend_dirs }}
      all_bundle_keys: ${{ steps.disc.outputs.all_bundle_keys }}
      all_app_names: ${{ steps.disc.outputs.all_app_names }}
      services_json: ${{ steps.disc.outputs.services_json }}
      frontends_json: ${{ steps.disc.outputs.frontends_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Discover projects
        id: disc
        run: |
          OUT=$(./scripts/discover-projects.sh)
          echo "service_dirs=$(echo "$OUT" | jq -c '.service_dirs')" >> "$GITHUB_OUTPUT"
          echo "frontend_dirs=$(echo "$OUT" | jq -c '.frontend_dirs')" >> "$GITHUB_OUTPUT"
          echo "all_bundle_keys=$(echo "$OUT" | jq -c '.all_bundle_keys')" >> "$GITHUB_OUTPUT"
          echo "all_app_names=$(echo "$OUT" | jq -c '.all_app_names')" >> "$GITHUB_OUTPUT"
          echo "services_json=$(echo "$OUT" | jq -c '.services')" >> "$GITHUB_OUTPUT"
          echo "frontends_json=$(echo "$OUT" | jq -c '.frontends')" >> "$GITHUB_OUTPUT"

      - name: Compute branch slug
        id: slug
        run: |
          SLUG="pr-${{ github.event.pull_request.number }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Computed slug: $SLUG"

      - name: Generate dynamic path filters
        run: ./scripts/discover-projects.sh --path-filters > .github/dynamic-filters.yml

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/dynamic-filters.yml

      - name: Compute changed services and frontends (filter out meta keys)
        id: changed
        run: |
          ALL_CHANGES='${{ steps.filter.outputs.changes }}'
          SERVICE_DIRS='${{ steps.disc.outputs.service_dirs }}'
          FRONTEND_DIRS='${{ steps.disc.outputs.frontend_dirs }}'
          CHANGED_SVCS=$(echo "$ALL_CHANGES" | jq -c --argjson dirs "$SERVICE_DIRS" '[.[] | select(. as $x | $dirs | index($x))]')
          CHANGED_FES=$(echo "$ALL_CHANGES" | jq -c --argjson dirs "$FRONTEND_DIRS" '[.[] | select(. as $x | $dirs | index($x))]')
          echo "changed_services=$CHANGED_SVCS" >> "$GITHUB_OUTPUT"
          echo "changed_frontends=$CHANGED_FES" >> "$GITHUB_OUTPUT"
          echo "Changed services: $CHANGED_SVCS"
          echo "Changed frontends: $CHANGED_FES"

  # ---------------------------------------------------------------------------
  # Stage 2: per-service lint + unit tests.
  # ---------------------------------------------------------------------------
  service-checks:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.changed_services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync (service)
        working-directory: services/${{ matrix.service }}
        run: uv sync --all-groups

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: |
          if uv run ty --help >/dev/null 2>&1; then
            uv run ty check src
          else
            uv run python -m compileall -q src
          fi

      - name: Unit tests
        working-directory: services/${{ matrix.service }}
        run: uv run pytest -m 'not integration' -q

  # ---------------------------------------------------------------------------
  # Stage 2b: frontend BFF checks.
  # ---------------------------------------------------------------------------
  frontend-checks:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_frontends != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend: ${{ fromJSON(needs.detect-changes.outputs.changed_frontends) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync (BFF)
        working-directory: frontend/${{ matrix.frontend }}
        run: uv sync --all-groups

      - name: BFF unit tests
        working-directory: frontend/${{ matrix.frontend }}
        run: |
          rc=0
          uv run pytest -m 'not integration' -q || rc=$?
          if [[ $rc -eq 5 ]]; then
            echo "No tests collected — skipping (exit code 5 is not a failure)"
            exit 0
          fi
          exit $rc

  # ---------------------------------------------------------------------------
  # Stage 3: bundle validate.
  # ---------------------------------------------------------------------------
  bundle-validate:
    needs: detect-changes
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-dev profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_DEV }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-dev]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me --profile hc-dev

      - name: bundle validate
        run: |
          databricks bundle validate -t dev \
            --var "app_name_suffix=-${{ needs.detect-changes.outputs.slug }}" \
            --var "lakebase_branch=${{ needs.detect-changes.outputs.slug }}"

  # ---------------------------------------------------------------------------
  # Stage 4: deploy a preview.
  # ---------------------------------------------------------------------------
  preview-deploy:
    needs: [detect-changes, service-checks, frontend-checks, bundle-validate]
    if: |
      always() &&
      !cancelled() &&
      needs.detect-changes.result == 'success' &&
      needs.bundle-validate.result == 'success' &&
      (needs.service-checks.result == 'success' || needs.service-checks.result == 'skipped') &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.urls.outputs.portal_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write hc-dev profile to ~/.databrickscfg
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_DEV }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [hc-dev]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me --profile hc-dev

      - name: Compute changed-services list
        id: changed
        env:
          ALL_CHANGES: ${{ needs.detect-changes.outputs.service_changes }}
          SERVICE_DIRS: ${{ needs.detect-changes.outputs.service_dirs }}
        run: |
          OUT=()
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            if echo "$ALL_CHANGES" | grep -q "\"$svc\""; then
              OUT+=("$svc")
            fi
          done
          echo "services=${OUT[*]}" >> "$GITHUB_OUTPUT"
          echo "Changed services: ${OUT[*]}"

      - name: Ensure Lakebase projects exist (idempotent)
        env:
          SERVICE_DIRS: ${{ needs.detect-changes.outputs.service_dirs }}
        run: |
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-project-up.sh "$svc" dev hc-dev
          done

      - name: Provision Lakebase feature branches (all services)
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          SERVICE_DIRS: ${{ needs.detect-changes.outputs.service_dirs }}
        run: |
          set -euo pipefail
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-branch-up.sh "$svc" "$SLUG" hc-dev
          done

      - name: Run migrations against feature branches
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
        run: |
          set -euo pipefail
          for svc in ${{ steps.changed.outputs.services }}; do
            echo "→ Migrating $svc against $SLUG"
            cd "services/$svc"
            ENDPOINT="projects/$svc/branches/$SLUG/endpoints/primary"
            HOST=$(databricks postgres get-endpoint "$ENDPOINT" -p hc-dev -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"]["hosts"]["host"])')
            export PGHOST="$HOST"
            export PGPORT=5432
            export PGDATABASE=databricks_postgres
            export PGUSER=$(databricks current-user me -p hc-dev -o json | python3 -c 'import json,sys; print(json.load(sys.stdin)["userName"])')
            export PGSSLMODE=require
            export ENDPOINT_NAME="$ENDPOINT"
            uv sync --all-groups
            uv run alembic upgrade head
            cd "$GITHUB_WORKSPACE"
          done

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/*/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install apx CLI
        run: |
          set -euo pipefail
          curl -fsSL https://databricks-solutions.github.io/apx/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build all frontend UIs
        run: ./scripts/build-frontends.sh

      - name: Compute changed bundle keys
        id: bundle-keys
        env:
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.changed_services }}
          CHANGED_FRONTENDS: ${{ needs.detect-changes.outputs.changed_frontends }}
          SERVICES_JSON: ${{ needs.detect-changes.outputs.services_json }}
          FRONTENDS_JSON: ${{ needs.detect-changes.outputs.frontends_json }}
        run: |
          set -euo pipefail
          KEYS=$(python3 -c '
          import json, os
          changed_svcs = json.loads(os.environ["CHANGED_SERVICES"])
          changed_fes = json.loads(os.environ["CHANGED_FRONTENDS"])
          all_svcs = json.loads(os.environ["SERVICES_JSON"])
          all_fes = json.loads(os.environ["FRONTENDS_JSON"])
          changed_dirs = set(changed_svcs + changed_fes)
          keys = [p["bundle_key"] for p in all_svcs + all_fes if p["dir"] in changed_dirs]
          print(json.dumps(keys))
          ')
          echo "keys=$KEYS" >> "$GITHUB_OUTPUT"
          echo "Changed bundle keys: $KEYS"

      - name: Deploy changed apps
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          CHANGED_KEYS: ${{ steps.bundle-keys.outputs.keys }}
        run: |
          set -euo pipefail
          SELECT_ARGS=""
          for KEY in $(echo "$CHANGED_KEYS" | jq -r '.[]'); do
            SELECT_ARGS="$SELECT_ARGS --select apps.$KEY"
          done
          echo "→ Deploying:$SELECT_ARGS"
          databricks bundle deploy -t dev \
            --var "app_name_suffix=-$SLUG" \
            --var "lakebase_branch=$SLUG" \
            $SELECT_ARGS

      - name: Run changed apps (parallel)
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          CHANGED_KEYS: ${{ steps.bundle-keys.outputs.keys }}
        run: |
          set -euo pipefail
          LOG_DIR=$(mktemp -d)
          mapfile -t KEYS < <(echo "$CHANGED_KEYS" | jq -r '.[]')
          PIDS=()
          for KEY in "${KEYS[@]}"; do
            databricks bundle run -t dev "apps.$KEY" \
              --var "app_name_suffix=-$SLUG" \
              --var "lakebase_branch=$SLUG" \
              > "$LOG_DIR/$KEY.log" 2>&1 &
            PIDS+=("$!")
            echo "→ kicked apps.$KEY (pid=$!)"
          done
          FAIL=0
          for i in "${!KEYS[@]}"; do
            KEY="${KEYS[$i]}"
            if wait "${PIDS[$i]}"; then
              echo "✓ $KEY"
              tail -3 "$LOG_DIR/$KEY.log" | sed 's/^/    /'
            else
              echo "::error::$KEY failed; full log:"
              cat "$LOG_DIR/$KEY.log"
              FAIL=1
            fi
          done
          rm -rf "$LOG_DIR"
          (( FAIL == 0 )) || exit 1

      - name: Compute changed app names
        id: changed-apps
        env:
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.changed_services }}
          CHANGED_FRONTENDS: ${{ needs.detect-changes.outputs.changed_frontends }}
          SERVICES_JSON: ${{ needs.detect-changes.outputs.services_json }}
          FRONTENDS_JSON: ${{ needs.detect-changes.outputs.frontends_json }}
        run: |
          set -euo pipefail
          NAMES=$(python3 -c '
          import json, os
          changed_dirs = set(json.loads(os.environ["CHANGED_SERVICES"]) + json.loads(os.environ["CHANGED_FRONTENDS"]))
          all_projects = json.loads(os.environ["SERVICES_JSON"]) + json.loads(os.environ["FRONTENDS_JSON"])
          names = [p["app_name"] for p in all_projects if p["dir"] in changed_dirs]
          print(json.dumps(names))
          ')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"
          echo "Changed app names: $NAMES"

      - name: Wait for RUNNING state
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          CHANGED_APP_NAMES: ${{ steps.changed-apps.outputs.names }}
        run: |
          set -euo pipefail
          for app in $(echo "$CHANGED_APP_NAMES" | jq -r '.[]'); do
            for i in $(seq 1 20); do
              STATE=$(databricks apps get "$app-$SLUG" -p hc-dev -o json \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("compute_status",{}).get("state",""))')
              echo "  $app-$SLUG attempt $i/20: state=$STATE"
              if [[ "$STATE" == "RUNNING" ]]; then
                break
              fi
              if (( i == 20 )); then
                echo "::error::$app-$SLUG did not reach RUNNING within 5 minutes"
                exit 1
              fi
              sleep 15
            done
          done

      - name: Smoke-test preview (honest /healthz check)
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.changed_services }}
          CHANGED_FRONTENDS: ${{ needs.detect-changes.outputs.changed_frontends }}
          SERVICES_JSON: ${{ needs.detect-changes.outputs.services_json }}
          FRONTENDS_JSON: ${{ needs.detect-changes.outputs.frontends_json }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS --fail \
            -u "$DATABRICKS_CLIENT_ID:$DATABRICKS_CLIENT_SECRET" \
            --data-urlencode 'grant_type=client_credentials' \
            --data-urlencode 'scope=all-apis' \
            "$DATABRICKS_HOST/oidc/v1/token" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          assert_healthz() {
            local app="$1" path="$2"
            local url body_file http_code body
            url=$(databricks apps get "$app" -p hc-dev -o json \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("url",""))')
            if [[ -z "$url" ]]; then
              echo "::error::$app has no URL — deploy may have failed"
              return 1
            fi
            body_file=$(mktemp)
            http_code=$(curl -sS -o "$body_file" -w '%{http_code}' --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$url$path")
            body=$(cat "$body_file"); rm -f "$body_file"
            if [[ "$http_code" != "200" ]]; then
              echo "::error::$app $path -> HTTP $http_code (expected 200)"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            if [[ "$body" != '{"ok":true}' ]]; then
              echo "::error::$app $path -> 200 but body mismatch:"
              echo "  body (first 300 chars): $(printf '%s' "$body" | head -c 300)"
              return 1
            fi
            echo "✓ $app $path -> 200 $body"
          }
          CHANGED_DIRS=$(python3 -c "import json,os; print(' '.join(json.loads(os.environ['CHANGED_SERVICES']) + json.loads(os.environ['CHANGED_FRONTENDS'])))")
          FAIL=0
          for row in $(echo "$SERVICES_JSON" | jq -c '.[]'); do
            dir=$(echo "$row" | jq -r '.dir')
            echo "$CHANGED_DIRS" | grep -qw "$dir" || continue
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app-$SLUG" "$healthz" || FAIL=1
          done
          for row in $(echo "$FRONTENDS_JSON" | jq -c '.[]'); do
            dir=$(echo "$row" | jq -r '.dir')
            echo "$CHANGED_DIRS" | grep -qw "$dir" || continue
            app=$(echo "$row" | jq -r '.app_name')
            healthz=$(echo "$row" | jq -r '.healthz')
            assert_healthz "$app-$SLUG" "$healthz" || FAIL=1
          done
          (( FAIL == 0 )) || exit 1

      - name: Collect preview app URLs
        id: urls
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          CHANGED_APP_NAMES: ${{ steps.changed-apps.outputs.names }}
          FRONTENDS_JSON: ${{ needs.detect-changes.outputs.frontends_json }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, subprocess
          slug = os.environ["SLUG"]
          changed_apps = json.loads(os.environ["CHANGED_APP_NAMES"])
          frontends = json.loads(os.environ["FRONTENDS_JSON"])
          urls = {}
          for app_name in changed_apps:
              app = f"{app_name}-{slug}"
              out = subprocess.check_output(
                  ["databricks","apps","get",app,"-p","hc-dev","-o","json"],
                  text=True,
              )
              urls[app_name] = json.loads(out).get("url","") or ""
          print(f"map={json.dumps(urls)}")
          portal_name = frontends[0]["app_name"] if frontends else ""
          print(f"portal_url={urls.get(portal_name,'')}")
          PY

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        env:
          URLS_JSON: ${{ steps.urls.outputs.map }}
          CHANGED_APP_NAMES: ${{ steps.changed-apps.outputs.names }}
        with:
          script: |
            const slug = '${{ needs.detect-changes.outputs.slug }}';
            const urls = JSON.parse(process.env.URLS_JSON || '{}');
            const changedApps = JSON.parse(process.env.CHANGED_APP_NAMES || '[]');
            const body = [
              '### Preview deploy ready',
              '',
              `Slug: \`${slug}\``,
              `Changed apps: \`${changedApps.join(', ')}\``,
              '',
              '| App | URL |',
              '|---|---|',
              ...changedApps.map(s => `| \`${s}-${slug}\` | ${urls[s] || 'N/A'} |`),
              '',
              'Login with your Databricks user; the BFF forwards your OBO token to each backend.',
              '',
              '_Closing or merging this PR triggers `pr-cleanup.yml` which destroys the preview + Lakebase branches._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const prior = comments.find(c => c.body && c.body.includes('Preview deploy ready'));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prior.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body
              });
            }

      - name: Teardown on failure (destroy bundle + Lakebase branches)
        if: failure()
        env:
          SLUG: ${{ needs.detect-changes.outputs.slug }}
          SERVICE_DIRS: ${{ needs.detect-changes.outputs.service_dirs }}
        run: |
          set -uo pipefail
          echo "::warning::Pipeline failed — tearing down preview resources for $SLUG"
          echo "→ Destroying bundle..."
          databricks bundle destroy -t dev --auto-approve \
            --var "app_name_suffix=-$SLUG" \
            --var "lakebase_branch=$SLUG" || echo "  bundle destroy failed (may be partial)"
          echo "→ Removing Lakebase branches..."
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-branch-down.sh "$svc" "$SLUG" hc-dev || echo "  $svc branch-down failed (may not exist)"
          done
          echo "Teardown complete."
