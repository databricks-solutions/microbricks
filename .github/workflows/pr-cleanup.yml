name: pr-cleanup

# Tear down per-PR preview resources when a PR closes (merged OR closed without
# merge — the cleanup must happen in both cases). Two things to remove:
#
#   1. The preview bundle deploy (`<svc>-dev-<slug>` apps; slug already
#      carries its `feat-`/`hotfix-` prefix).
#   2. The Lakebase feature branches + endpoints provisioned by pr-validate.
#
# The platform's 24h Lakebase branch TTL is the safety net — if this workflow
# fails (e.g. a force-pushed deletion before close), the branches are still
# garbage-collected by the platform AND the nightly-orphan-cleanup.yml job.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

# Avoid clobbering a still-running pr-validate from the same PR — but DON'T
# cancel ourselves; cleanup must run to completion.
concurrency:
  group: pr-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  DATABRICKS_HOST: ${{ github.event.pull_request.base.ref == 'develop' && vars.DATABRICKS_HOST_DEV || vars.DATABRICKS_HOST_TEST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  destroy-preview:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.pull_request.base.ref == 'develop' && 'dev' || 'test' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve deploy environment from PR base branch
        id: env
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          if [[ "$BASE" == "develop" ]]; then
            echo "bundle_target=dev"    >> "$GITHUB_OUTPUT"
            echo "db_profile=hc-dev"    >> "$GITHUB_OUTPUT"
            echo "deploy_env=dev"       >> "$GITHUB_OUTPUT"
          else
            echo "bundle_target=e2e-test" >> "$GITHUB_OUTPUT"
            echo "db_profile=hc-test"   >> "$GITHUB_OUTPUT"
            echo "deploy_env=test"      >> "$GITHUB_OUTPUT"
          fi

      - name: Discover services
        id: disc
        run: |
          OUT=$(./scripts/discover-projects.sh)
          echo "service_dirs=$(echo "$OUT" | jq -c '.service_dirs')" >> "$GITHUB_OUTPUT"

      - name: Compute branch slug
        id: slug
        run: |
          SLUG="pr-${{ github.event.pull_request.number }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: ${{ env.DATABRICKS_CLI_VERSION }}

      - name: Write Databricks profile to ~/.databrickscfg
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [${{ steps.env.outputs.db_profile }}]
          host = ${DATABRICKS_HOST}
          client_id = ${DATABRICKS_CLIENT_ID}
          client_secret = ${DATABRICKS_CLIENT_SECRET}
          EOF
          chmod 600 "$HOME/.databrickscfg"
          databricks current-user me -p ${{ steps.env.outputs.db_profile }}

      - name: Destroy preview bundle
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          BUNDLE_TARGET: ${{ steps.env.outputs.bundle_target }}
        run: |
          set +e
          databricks bundle destroy -t "$BUNDLE_TARGET" \
            --var "app_name_suffix=-$SLUG" \
            --var "lakebase_branch=$SLUG" \
            --auto-approve
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::warning::bundle destroy returned $rc — likely nothing to destroy."
          fi
          exit 0

      - name: Tear down Lakebase feature branches
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          SERVICE_DIRS: ${{ steps.disc.outputs.service_dirs }}
          DB_PROFILE: ${{ steps.env.outputs.db_profile }}
        run: |
          for svc in $(echo "$SERVICE_DIRS" | jq -r '.[]'); do
            ./scripts/lakebase-branch-down.sh "$svc" "$SLUG" "$DB_PROFILE"
          done

      - name: Comment cleanup outcome on PR
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const merged = ${{ github.event.pull_request.merged }};
            const verb = merged ? 'merged' : 'closed';
            const body = [
              '### 🧹 Preview cleanup complete',
              '',
              `PR ${verb}; tore down preview apps and Lakebase branches for \`${slug}\`.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
