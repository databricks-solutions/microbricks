name: Deploy microbricks-deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/microbricks-deck/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend/microbricks-deck
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: frontend/microbricks-deck
        run: bun run vite build

      - name: Add 404 fallback for SPA routing
        run: cp frontend/microbricks-deck/dist/index.html frontend/microbricks-deck/dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/microbricks-deck/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
