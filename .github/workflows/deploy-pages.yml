name: Deploy microbricks-deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/microbricks-deck/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        working-directory: frontend/microbricks-deck
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: frontend/microbricks-deck
        run: bun run vite build

      - name: Prepare pages artifact
        run: |
          mkdir -p _site/deck
          cp -r frontend/microbricks-deck/dist/* _site/deck/
          cp _site/deck/index.html _site/deck/404.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
