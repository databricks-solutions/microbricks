name: Deploy microbricks-deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/microbricks-deck/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        working-directory: frontend/microbricks-deck
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: frontend/microbricks-deck
        run: bun run vite build

      - name: Deploy to docs/deck
        run: |
          rm -rf docs/deck
          mkdir -p docs/deck
          cp -r frontend/microbricks-deck/dist/* docs/deck/
          cp docs/deck/index.html docs/deck/404.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/deck docs/index.html
          git diff --cached --quiet && exit 0
          git commit -m "chore: rebuild microbricks-deck for GitHub Pages"
          git push
